name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: todo-atom-b9e39

jobs:
  deploy:
    name: Deploy Functions and Firestore
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Create Firebase service account credentials
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Create production environment file
        run: |
          cat <<EOF > ".env.${FIREBASE_PROJECT_ID}"
          NODE_ENV=production
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          EOF

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --project "$FIREBASE_PROJECT_ID" --only firestore,functions --non-interactive
